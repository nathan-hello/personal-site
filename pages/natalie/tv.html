<style>
  .is-offline #video-player {
    display: none;
  }

  .is-offline .fallback {
    display: block;
  }

  .is-online #video-player {
    display: block;
  }

  .is-online .fallback {
    display: none;
  }
</style>
<script type="module">
  async function check() {
    const {ok} = await fetch("https://tv.reluekiss.com/mystream/index.m3u8");
    if (ok) {
      document.getElementById("video-player").src = "https://tv.reluekiss.com/mystream"
      document.getElementById("video-parent").classList.remove("is-offline");
      document.getElementById("video-parent").classList.add("is-online");
    } else {
      document.getElementById("video-player").src = ""
      document.getElementById("video-parent").classList.remove("is-online");
      document.getElementById("video-parent").classList.add("is-offline");
    }
  }
  await check();
  setInterval(check, 5000);
</script>
<div id="video-parent" class="is-offline flex flex-row justify-center space-x-2 items-stretch max-h-full">
  <div class="fallback">
    <canvas class="aspect-4/3 w-full" height="720" width="960" id="canvas" tabindex="0"></canvas>
    <script>
      var Module = {
        canvas: (function () {
          const n = document.getElementById("canvas");
          return (n.addEventListener("click", () => n.focus()), n);
        })(),
        print: function (n) {
          // console.log(n);
        },
        printErr: function (n) {
          // console.error(n);
        },
      };
    </script>
    <script async src="/scripts/sorter.js"></script>
  </div>
  <iframe id="video-player" width="1280" height="720" allowfullscreen src=""></iframe>
  <!-- Chat Window -->
  <div id="side-window" class="flex flex-col items-center justify-center w-[320px] p-2 h-full chroma-bg" hx-get="/chat"
    hx-target="#side-window" hx-swap="innerHTML" hx-on="load"></div>
</div>
